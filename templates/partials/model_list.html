<div id="model-list">
{% set mc = s.model_component %}
{% if not mc %}
  <div class="empty-state">
    <div class="empty-icon">🌈</div>
    <div class="empty-title">No Models yet</div>
    <p>Create one above to start adding model components.</p>
  </div>
{% else %}
  {% for mkey in mc.keys() %}
    {% include "partials/model_card.html" %}
  {% endfor %}
{% endif %}
</div>
