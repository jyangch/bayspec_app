<!-- Import map: pin every @codemirror/* and @lezer/* to a SINGLE shared instance.
     CM6 does `instanceof @codemirror/state` checks under the hood; without
     deduping, two copies of @codemirror/state silently break the editor. -->
<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/@codemirror/state@6",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6?external=@codemirror/state",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
    "@codemirror/search": "https://esm.sh/@codemirror/search@6?external=@codemirror/state,@codemirror/view",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
    "@lezer/common": "https://esm.sh/@lezer/common@1",
    "@lezer/highlight": "https://esm.sh/@lezer/highlight@1?external=@lezer/common",
    "@lezer/lr": "https://esm.sh/@lezer/lr@1?external=@lezer/common,@lezer/highlight",
    "@lezer/python": "https://esm.sh/@lezer/python@1?external=@lezer/common,@lezer/highlight,@lezer/lr",
    "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/python"
  }
}
</script>

<!-- Default template code (read by the module script below) -->
<script id="default-code" type="text/plain">
from collections import OrderedDict

import numpy as np

from bayspec.model.model import Model
from bayspec.util.param import Cfg, Par
from bayspec.util.prior import unif


class mypl(Model):

    def __init__(self):
        super().__init__()
        self.expr = 'mypl'
        self.type = 'add'  # 'add' | 'mul' | 'math'
        self.comment = 'user-defined model'

        self.config = OrderedDict()
        self.config['redshift'] = Cfg(0)

        self.params = OrderedDict()
        self.params['norm'] = Par(1.0, unif(-5, 5))
        self.params['index'] = Par(-2.0, unif(-5, 0))

    def func(self, E, T=None, O=None):
        redshift = self.config['redshift'].value
        norm = self.params['norm'].value
        index = self.params['index'].value

        E = np.asarray(E)
        scalar = E.ndim == 0
        if scalar:
            E = E[np.newaxis]

        zi = 1 + redshift
        E = E * zi

        phtspec = 10 ** norm * E ** index

        return phtspec[0] if scalar else phtspec
</script>

<details class="user-library-section">
  <summary class="user-library-summary">
    <span class="user-library-title">User Model Library</span>
    <span class="user-library-count caption">{{ s.custom_models | length }} registered</span>
  </summary>

  <div class="user-library-body">
    <div class="editor-layout">

      <!-- ── Left: code editor + submit ── -->
      <div class="editor-left">
        <div class="card editor-card">
          <div class="editor-header">
            <span class="editor-label">Python editor</span>
          </div>
          <div id="code-editor"></div>
        </div>

        <form id="register-form"
              hx-post="/model/user-library/register"
              hx-target="#editor-panel"
              hx-swap="outerHTML"

              style="margin-top:.75rem;display:flex;align-items:center;gap:.75rem">
          <input type="hidden" id="code-input" name="code" />
          <button type="submit"
                  class="btn btn-primary"
                  onclick="document.getElementById('code-input').value = window.__cm_view ? window.__cm_view.state.doc.toString() : ''">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor" style="flex-shrink:0"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
            Register model
            <span id="reg-spinner" class="htmx-indicator"><span class="spinner"></span></span>
          </button>
          <span class="caption">The class will be available in any Model card's <em>user</em> library dropdown immediately.</span>
        </form>
      </div>

    </div>
  </div>
</details>

<script type="module">
import {
  EditorView,
  lineNumbers, highlightActiveLine, highlightActiveLineGutter,
  keymap, drawSelection, dropCursor, rectangularSelection, crosshairCursor,
} from '@codemirror/view';
import { EditorState } from '@codemirror/state';
import {
  history, defaultKeymap, historyKeymap, indentWithTab,
} from '@codemirror/commands';
import {
  syntaxHighlighting, defaultHighlightStyle, bracketMatching,
  indentOnInput, foldGutter, foldKeymap,
} from '@codemirror/language';
import {
  closeBrackets, closeBracketsKeymap,
  autocompletion, completionKeymap,
} from '@codemirror/autocomplete';
import { searchKeymap, highlightSelectionMatches } from '@codemirror/search';
import { python } from '@codemirror/lang-python';

const defaultCode = document.getElementById('default-code').textContent.trimStart();

const lightTheme = EditorView.theme({
  '&': {
    height: '420px',
    fontSize: '13px',
    color: '#0F172A',
    backgroundColor: '#FFFFFF',
  },
  '.cm-scroller': {
    overflow: 'auto',
    fontFamily: "'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace",
  },
  '.cm-content': { caretColor: '#4F46E5' },
  '&.cm-focused .cm-cursor': { borderLeftColor: '#4F46E5' },
  '&.cm-focused .cm-selectionBackground, ::selection': {
    backgroundColor: 'rgba(79,70,229,0.18)',
  },
  '.cm-gutters': {
    backgroundColor: '#F8FAFC',
    color: '#94A3B8',
    border: 'none',
    borderRight: '1px solid #EEF2F7',
  },
  '.cm-activeLine': { backgroundColor: 'rgba(79,70,229,0.04)' },
  '.cm-activeLineGutter': { backgroundColor: 'rgba(79,70,229,0.06)', color: '#4F46E5' },
}, { dark: false });

const view = new EditorView({
  doc: defaultCode,
  extensions: [
    lineNumbers(),
    highlightActiveLineGutter(),
    history(),
    foldGutter(),
    drawSelection(),
    dropCursor(),
    EditorState.allowMultipleSelections.of(true),
    indentOnInput(),
    syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
    bracketMatching(),
    closeBrackets(),
    autocompletion(),
    rectangularSelection(),
    crosshairCursor(),
    highlightActiveLine(),
    highlightSelectionMatches(),
    keymap.of([
      ...closeBracketsKeymap,
      ...defaultKeymap,
      ...searchKeymap,
      ...historyKeymap,
      ...foldKeymap,
      ...completionKeymap,
      indentWithTab,
    ]),
    python(),
    lightTheme,
  ],
  parent: document.getElementById('code-editor'),
});

window.__cm_view = view;

// CM6 measures gutters lazily; trigger remeasure on first open.
const section = document.querySelector('.user-library-section');
if (section) {
  section.addEventListener('toggle', () => {
    if (section.open) view.requestMeasure();
  }, { once: true });
}
</script>
